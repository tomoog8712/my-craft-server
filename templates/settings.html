<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>設定 - My Craft Server</title>
  <link rel="stylesheet" href="/static/style.css?v=3">
  <link rel="stylesheet" href="/static/settings.css?v=5">
</head>
<body class="settings-page">
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⛏</span>
        <div>
          <h1 data-i18n="settings_title">設定</h1>
          <p class="subtitle" data-i18n="settings_subtitle">サーバー</p>
        </div>
      </div>
      <button type="button" class="lang-btn" id="btn-lang"><span id="lang-label">日本語</span></button>
    </div>
  </header>

  <main class="container">
    {% include '_nav.html' %}


    <div id="changes-banner" class="changes-banner" hidden>
      <p class="changes-title" data-i18n="changes_title">変更があります</p>
      <p class="changes-sub" data-i18n="changes_sub">設定を反映してください</p>
      <button type="button" class="btn-apply-changes" id="btn-apply-changes" data-i18n="apply_changes">反映する</button>
    </div>

    <div id="pending-banner" class="pending-banner" hidden>
      <p class="pending-title" data-i18n="pending_text">未反映の設定があります</p>
      <p class="pending-sub" data-i18n="changes_sub">設定を反映してください</p>
      <button type="button" class="btn-apply-now" id="btn-apply-now" data-i18n="apply_now">今すぐ反映</button>
    </div>

    <div id="settings-fields">
      <p class="settings-loading" data-i18n="loading_settings">読み込み中…</p>
    </div>
  </main>

  <div id="snackbar" class="snackbar" hidden></div>

  <div id="loading-overlay" class="loading-overlay" hidden>
    <div class="loading-box">
      <div class="loading-spinner"></div>
      <p class="loading-title" data-i18n="restarting_title">Minecraftサーバーを再起動しています…</p>
      <p class="loading-sub" data-i18n="restarting_wait">しばらくお待ちください…</p>
    </div>
  </div>

  <div id="picker-sheet" class="sheet" hidden>
    <div class="sheet-backdrop" id="picker-backdrop"></div>
    <div class="sheet-panel">
      <div class="sheet-title" id="picker-title"></div>
      <div id="picker-options"></div>
    </div>
  </div>

  <div id="info-sheet" class="sheet" hidden>
    <div class="sheet-backdrop" id="info-backdrop"></div>
    <div class="sheet-panel">
      <div class="sheet-title" id="info-title"></div>
      <p class="info-sheet-text" id="info-text"></p>
    </div>
  </div>

  <div id="lang-sheet" class="sheet" hidden>
    <div class="sheet-backdrop" id="lang-backdrop"></div>
    <div class="sheet-panel">
      <div class="sheet-title" data-i18n="language">言語</div>
      <button type="button" class="sheet-option" data-lang="ja" data-i18n="lang_ja">日本語</button>
      <button type="button" class="sheet-option" data-lang="en" data-i18n="lang_en">English</button>
    </div>
  </div>

  <div id="save-restart-sheet" class="sheet sheet-center" hidden>
    <div class="sheet-backdrop" id="save-restart-backdrop"></div>
    <div class="sheet-panel">
      <p class="dialog-title" data-i18n="saved_dialog_title">設定を保存しました。</p>
      <p class="dialog-body" data-i18n="saved_dialog_body"></p>
      <div class="dialog-actions">
        <button type="button" class="btn btn-secondary" id="save-restart-later" data-i18n="later">あとで</button>
        <button type="button" class="btn btn-primary" id="save-restart-ok" data-i18n="restart_now">今すぐ反映</button>
      </div>
    </div>
  </div>

  <div id="confirm-sheet" class="sheet sheet-center" hidden>
    <div class="sheet-backdrop" id="confirm-backdrop"></div>
    <div class="sheet-panel">
      <p id="confirm-text" class="dialog-body"></p>
      <div class="dialog-actions">
        <button type="button" class="btn btn-secondary" id="confirm-cancel-btn" data-i18n="confirm_cancel">キャンセル</button>
        <button type="button" class="btn btn-primary" id="confirm-ok-btn" data-i18n="confirm_ok">OK</button>
      </div>
    </div>
  </div>

  <script src="/static/i18n.js?v=6"></script>
  <script src="/static/settings.js?v=7"></script>
</body>
</html>
