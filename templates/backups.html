<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>バックアップ - My Craft Server</title>
  <link rel="stylesheet" href="/static/style.css?v=3">
  <link rel="stylesheet" href="/static/update.css?v=1">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⛏</span>
        <div>
          <h1>My Craft Server</h1>
          <p class="subtitle">バックアップ</p>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    {% include '_nav.html' %}


    <section class="card">
      <h2 class="card-title">バックアップ一覧</h2>
      <p class="card-label" style="margin-bottom:12px;">最新10件を保持します。アップデート前に自動作成されます。</p>
      <div id="backup-list" class="backup-list">
        <p class="card-label">読み込み中…</p>
      </div>
    </section>
  </main>

  <div id="confirm-sheet" class="sheet-center" hidden>
    <div class="sheet-backdrop" id="confirm-backdrop"></div>
    <div class="sheet-panel">
      <p class="dialog-body" id="confirm-text"></p>
      <div class="dialog-actions">
        <button type="button" class="btn btn-secondary" id="confirm-cancel">キャンセル</button>
        <button type="button" class="btn btn-primary" id="confirm-ok">OK</button>
      </div>
    </div>
  </div>

  <div id="loading-overlay" class="update-overlay" hidden>
    <div class="update-panel">
      <div class="loading-spinner" style="width:48px;height:48px;border:4px solid #E5E7EB;border-top-color:var(--green);border-radius:50%;margin:0 auto 16px;animation:spin .9s linear infinite;"></div>
      <p id="loading-text">処理中…</p>
    </div>
  </div>

  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  <script src="/static/backups.js?v=1"></script>
</body>
</html>
